name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install mkdocs-material mkdocs-minify-plugin

      # Build content/ directory from repo structure
      - name: Assemble content directory
        run: |
          mkdir -p content

          # Home page
          cp README.md content/index.md

          # Foundations
          mkdir -p content/foundations
          cp foundations/*.md content/foundations/

          # Change Agility
          mkdir -p content/change-agility/theory
          mkdir -p content/change-agility/pillars
          mkdir -p content/change-agility/diagnostics
          mkdir -p content/change-agility/tools
          cp change-agility/readme.md content/change-agility/index.md
          # Theory
          for f in change-agility/theory/*.md; do
            [ -f "$f" ] && cp "$f" content/change-agility/theory/
          done
          # Pillars
          for d in change-agility/pillars/*/; do
            for f in "$d"*.md; do
              [ -f "$f" ] && cp "$f" content/change-agility/pillars/
            done
          done
          for f in change-agility/pillars/*.md; do
            [ -f "$f" ] && cp "$f" content/change-agility/pillars/
          done
          # Diagnostics
          for f in $(find change-agility/diagnostics -name '*.md'); do
            cp "$f" content/change-agility/diagnostics/
          done
          # Tools
          for f in change-agility/tools/*.md; do
            [ -f "$f" ] && cp "$f" content/change-agility/tools/
          done
          [ ! -f content/change-agility/tools/index.md ] && cp content/change-agility/tools/README.md content/change-agility/tools/index.md 2>/dev/null || echo "# Tools" > content/change-agility/tools/index.md

          # Leadership Delta
          mkdir -p content/leadership-delta/tools
          cp leadership-delta/readme.md content/leadership-delta/index.md
          for f in $(find leadership-delta -name '*.md' ! -name 'readme.md' ! -name '*.gitkeep'); do
            cp "$f" content/leadership-delta/tools/ 2>/dev/null || true
          done

          # Behavioral Governance
          mkdir -p content/behavioral-governance/theory
          mkdir -p content/behavioral-governance/tools
          cp behavioral-governance/readme.md content/behavioral-governance/index.md
          for f in $(find behavioral-governance/theory -name '*.md'); do
            bn=$(basename "$f")
            cp "$f" "content/behavioral-governance/theory/$bn"
          done
          [ -f content/behavioral-governance/theory/Adaptive_adoption_governance_framework.md ] && \
            mv content/behavioral-governance/theory/Adaptive_adoption_governance_framework.md \
               content/behavioral-governance/theory/governance-framework.md
          for f in $(find behavioral-governance/dimensions -name '*.md' ! -name '.gitkeep'); do
            bn=$(basename "$f")
            cp "$f" "content/behavioral-governance/tools/$bn"
          done

          # Maturity Model
          mkdir -p content/maturity-model
          cp maturity-model/*.md content/maturity-model/

          # Assets
          cp assets/extra.css content/extra.css

          echo "=== Content directory ==="
          find content -type f | sort

      - run: mkdocs build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
