name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install mkdocs-material mkdocs-minify-plugin

      - name: Assemble content directory
        run: |
          set -e
          mkdir -p content

          # ── Home ──
          cp README.md content/index.md

          # ── Foundations (repo: why-change-must-change/) ──
          mkdir -p content/foundations
          cp why-change-must-change/*.md content/foundations/ 2>/dev/null || true

          # ── Change Agility ──
          mkdir -p content/change-agility/theory
          mkdir -p content/change-agility/pillars
          mkdir -p content/change-agility/diagnostics
          mkdir -p content/change-agility/tools

          cp change-agility/readme.md content/change-agility/index.md

          # Theory
          cp change-agility/theory/*.md content/change-agility/theory/ 2>/dev/null || true

          # Pillars – .md files inside pillar subdirectories
          for d in change-agility/pillars/*/; do
            [ -d "$d" ] || continue
            for f in "$d"*.md; do
              [ -f "$f" ] && cp "$f" content/change-agility/pillars/
            done
          done
          # Also root-level pillar .md files
          for f in change-agility/pillars/*.md; do
            [ -f "$f" ] && cp "$f" content/change-agility/pillars/
          done

          # Diagnostics – recursive copy
          find change-agility/diagnostics -name '*.md' -exec cp {} content/change-agility/diagnostics/ \;

          # Tools
          cp change-agility/tools/*.md content/change-agility/tools/ 2>/dev/null || true

          # ── Leadership Delta ──
          mkdir -p content/leadership-delta/pillars
          mkdir -p content/leadership-delta/tools
          cp leadership-delta/readme.md content/leadership-delta/index.md
          # Dimension pages (root-level .md files in pillars/)
          cp leadership-delta/pillars/0*.md content/leadership-delta/pillars/ 2>/dev/null || true
          # conditions-audit lives in pillars/01-strategic-imagination/
          cp leadership-delta/pillars/01-strategic-imagination/conditions-audit.md content/leadership-delta/tools/ 2>/dev/null || true

          # ── Behavioral Governance ──
          mkdir -p content/behavioral-governance/pillars
          mkdir -p content/behavioral-governance/theory
          mkdir -p content/behavioral-governance/tools
          cp behavioral-governance/readme.md content/behavioral-governance/index.md
          # Dimension pages (root-level 0*.md files in pillars/)
          cp behavioral-governance/pillars/0*.md content/behavioral-governance/pillars/ 2>/dev/null || true
          # governance-framework lives in pillars/
          cp behavioral-governance/pillars/governance-framework.md content/behavioral-governance/theory/ 2>/dev/null || true
          # governance-dashboard lives in dashboard/
          cp behavioral-governance/dashboard/governance-dashboard.md content/behavioral-governance/tools/ 2>/dev/null || true

          # ── Maturity Model ──
          mkdir -p content/maturity-model
          cp maturity-model/*.md content/maturity-model/ 2>/dev/null || true

          # ── Assets ──
          cp assets/extra.css content/extra.css 2>/dev/null || true

          # ── Root-level pages (linked from homepage) ──
          cp what-is-adaptive-adoption.md content/ 2>/dev/null || true
          cp why-adaptive-adoption-matters.md content/ 2>/dev/null || true
          cp how-this-repo-works.md content/ 2>/dev/null || true

          # ── Provenance ──
          mkdir -p content/provenance
          cp provenance/*.md content/provenance/ 2>/dev/null || true
          if [ ! -f content/provenance/index.md ]; then
            printf '# Provenance\n\nIntellectual lineage, philosophical foundations, and acknowledgements.\n' > content/provenance/index.md
          fi

          # ── Google Search Console verification ──
          cp googleacea638aeb4140cf.html content/ 2>/dev/null || true

          # ── Visual assets (hero images referenced as ../visuals-and-presentations/... from domain readmes) ──
          mkdir -p content/visuals-and-presentations
          cp -r visuals-and-presentations/* content/visuals-and-presentations/

          # ── Create stubs for any missing nav targets ──
          for f in \
            content/foundations/conditions-that-dont-hold.md \
            content/foundations/six-unprecedented-conditions.md \
            content/change-agility/theory/philosophical-foundations.md \
            content/change-agility/pillars/01-master-the-craft.md \
            content/change-agility/pillars/02-embrace-complexity.md \
            content/change-agility/pillars/03-consciously-manage-trust.md \
            content/change-agility/pillars/04-put-people-first.md \
            content/change-agility/pillars/05-design-and-prototype.md \
            content/change-agility/pillars/06-prioritize-behavior.md \
            content/change-agility/pillars/07-manage-ethics-always.md \
            content/change-agility/diagnostics/AA_MI_structure.md \
            content/change-agility/tools/index.md \
            content/leadership-delta/pillars/01-strategic-imagination.md \
            content/leadership-delta/pillars/02-active-modeling.md \
            content/leadership-delta/pillars/03-creative-cultivation.md \
            content/leadership-delta/pillars/04-friction-courage.md \
            content/leadership-delta/pillars/05-trust-calibration.md \
            content/leadership-delta/pillars/06-ethical-stewardship.md \
            content/leadership-delta/pillars/07-systems-orchestration.md \
            content/leadership-delta/tools/conditions-audit.md \
            content/behavioral-governance/pillars/01-decision-rights.md \
            content/behavioral-governance/pillars/02-agent-authority.md \
            content/behavioral-governance/pillars/03-risk-intelligence.md \
            content/behavioral-governance/pillars/04-governance-intelligence.md \
            content/behavioral-governance/pillars/05-first-derivative-talent.md \
            content/behavioral-governance/pillars/06-strategic-coherence.md \
            content/behavioral-governance/theory/governance-framework.md \
            content/behavioral-governance/tools/governance-dashboard.md \
            content/maturity-model/maturity-model-state.md \
            content/maturity-model/white-paper-v0.1.md; do
            if [ ! -f "$f" ]; then
              bn=$(basename "$f" .md)
              echo "# ${bn//-/ }" > "$f"
              echo "" >> "$f"
              echo "*This page is under construction.*" >> "$f"
            fi
          done

          echo "=== Content directory ==="
          find content -type f | sort

      - run: mkdocs build

      - name: Copy Google Search Console verification
        run: cp googleacea638aeb4140cf.html _site/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
