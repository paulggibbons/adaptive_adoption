name: One-time promote friction audit

on:
  push:
    branches:
      - release/ai-adoption-friction-audit-live
    paths:
      - scripts/_one_time_promote_friction_audit.py
      - .github/workflows/_one-time-promote-friction-audit.yml

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/ai-adoption-friction-audit-live
          fetch-depth: 0
      - name: Promote Audit manifest record
        run: python scripts/_one_time_promote_friction_audit.py
      - name: Validate manifest
        run: python scripts/validate_manifests.py
      - name: Commit release record
        run: |
          if git diff --quiet -- data/tools.yml; then
            echo "Manifest already promoted"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tools.yml
          git commit -m "release: promote AI Adoption Friction Audit to live"
          git push origin HEAD:release/ai-adoption-friction-audit-live
