site_name: Adaptive Adoption™
site_description: >-
  A three-layer framework for human-centered AI adoption.
  Change management was built for projects. AI is not a project.
site_author: Paul Gibbons
site_url: https://paulggibbons.github.io/adaptive_adoption/
repo_url: https://github.com/paulggibbons/adaptive_adoption
repo_name: paulggibbons/adaptive_adoption

# Content assembled dynamically by GitHub Actions workflow
docs_dir: content
site_dir: _site

theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: DM Sans
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.svg
  favicon: assets/favicon.ico

extra_css:
  - extra.css

nav:
  - Home: index.md
  - Foundations:
    - Why This Framework: foundations/conditions-that-dont-hold.md
    - Six Unprecedented Conditions: foundations/six-unprecedented-conditions.md
  - Change Agility — The Flywheel:
    - Overview: change-agility/index.md
    - Theory:
      - Philosophical Foundations: change-agility/theory/philosophical-foundations.md
    - Pillars:
      - P1 — Master the Craft: change-agility/pillars/01-master-the-craft.md
      - P2 — Embrace Complexity: change-agility/pillars/02-embrace-complexity.md
      - P3 — Consciously Manage Trust: change-agility/pillars/03-consciously-manage-trust.md
      - P4 — Put People First: change-agility/pillars/04-put-people-first.md
      - P5 — Design and Prototype: change-agility/pillars/05-design-and-prototype.md
      - P6 — Prioritize Behavior: change-agility/pillars/06-prioritize-behavior.md
      - P7 — Manage Ethics Always: change-agility/pillars/07-manage-ethics-always.md
    - Diagnostics:
      - AAMI Structure: change-agility/diagnostics/AA_MI_structure.md
    - Tools:
      - Tools Overview: change-agility/tools/index.md
  - Leadership Delta — The Torque:
    - Overview: leadership-delta/index.md
    - Dimensions:
      - D1 — Strategic Imagination: leadership-delta/pillars/01-strategic-imagination.md
      - D2 — Active Modeling: leadership-delta/pillars/02-active-modeling.md
      - D3 — Creative Cultivation: leadership-delta/pillars/03-creative-cultivation.md
      - D4 — Friction Courage: leadership-delta/pillars/04-friction-courage.md
      - D5 — Trust Calibration: leadership-delta/pillars/05-trust-calibration.md
      - D6 — Ethical Stewardship: leadership-delta/pillars/06-ethical-stewardship.md
      - D7 — Systems Orchestration: leadership-delta/pillars/07-systems-orchestration.md
    - Tools:
      - Conditions Audit: leadership-delta/tools/conditions-audit.md
  - Behavioral Governance — The Guardrails:
    - Overview: behavioral-governance/index.md
    - Theory:
      - Governance Framework: behavioral-governance/theory/governance-framework.md
    - Dimensions:
      - D1 — Decision Rights: behavioral-governance/pillars/01-decision-rights.md
      - D2 — Agent Authority: behavioral-governance/pillars/02-agent-authority.md
      - D3 — Risk Intelligence: behavioral-governance/pillars/03-risk-intelligence.md
      - D4 — Governance Intelligence: behavioral-governance/pillars/04-governance-intelligence.md
      - D5 — 1st-Derivative Talent: behavioral-governance/pillars/05-first-derivative-talent.md
      - D6 — Strategic Coherence: behavioral-governance/pillars/06-strategic-coherence.md
    - Tools:
      - Governance Dashboard: behavioral-governance/tools/governance-dashboard.md
  - Maturity Model:
    - Current State: maturity-model/maturity-model-state.md
    - White Paper v0.1: maturity-model/white-paper-v0.1.md

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/paulggibbons/
    - icon: fontawesome/brands/github
      link: https://github.com/paulggibbons/adaptive_adoption
    - icon: fontawesome/solid/globe
      link: https://paulgibbonsadvisory.com
    - icon: fontawesome/solid/envelope
      link: https://thinkbiggerthinkbetter.substack.com
  generator: false

copyright: >-
  © 2026 Paul Gibbons · Adaptive Adoption™ ·
  <a href="https://paulgibbonsadvisory.com/diagnostics">Try the Diagnostics</a> ·
  <a href="https://paulgibbonsadvisory.com/corpus">Query the Corpus</a>
